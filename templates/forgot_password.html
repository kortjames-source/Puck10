{% extends "base.html" %}

{% block title %}Forgot Password - Puck10 Clues{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">
    <div class="card">
        <h2 class="text-center" style="font-size: 2rem; margin-bottom: 0.5rem; font-family: var(--font-display);">Recover Password</h2>
        <p class="text-secondary text-center" style="margin-bottom: 2rem;">Enter your email address and we'll send you a secure link to reset your password.</p>
        
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your registered email" required autofocus>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem 1.5rem; font-size: 1.1rem; margin-bottom: 1.5rem;">
                <i class="fa-solid fa-paper-plane"></i> Send Recovery Link
            </button>
        </form>
        
        <p class="text-secondary text-center" style="font-size: 0.9rem;">
            Back to <a href="{{ url_for('login') }}" style="font-weight: 600;">Login</a>
        </p>
    </div>
</div>
{% endblock %}

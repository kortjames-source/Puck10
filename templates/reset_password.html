{% extends "base.html" %}

{% block title %}Reset Password - Puck10 Clues{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">
    <div class="card">
        <h2 class="text-center" style="font-size: 2rem; margin-bottom: 0.5rem; font-family: var(--font-display);">Reset Password</h2>
        <p class="text-secondary text-center" style="margin-bottom: 2rem;">Please choose a strong new password for your Puck10 account.</p>
        
        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6" autofocus>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem 1.5rem; font-size: 1.1rem; margin-bottom: 1.5rem;">
                <i class="fa-solid fa-circle-check"></i> Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
